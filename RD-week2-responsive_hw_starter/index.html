  <header>

  <main>

    <h2>Basic Media Queries</h2>

    <p>In this assignment you will add two media queries to the css file.</p>

    <ul>
      <li>First media query at 772px → div width 45%, images max-height 30vh</li>
      <li>Second media query at 998px → div width 30%</li>
    </ul>

    <!-- Color Blocks -->

    <div>
      <img src="images/Red.jpeg" alt="Red">

    </div>

      <img src="images/Orange.png" alt="Orange">

    </div>

    <div>
      <img src="images/Yellow.png" alt="Yellow">
      <p>Yellow</p>
    </div>

    <div>

    </div>

    <div>
      <img src="images/Blue.png" alt="Blue">

    </div>

    <div>
      <img src="images/Indigo.jpeg" alt="Indigo">
      <p>Indigo</p>
    </div>

    <div>
      <img src="images/Purple.png" alt="Purple">

    </div>

    <div>
      <img src="images/Pink.jpeg" alt="Pink">

  <footer>
